<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gabinete — Arte Contemporáneo en Chile</title>
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      background-color: #283f3e; /* El color verde de tu marca */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    .logo-link {
      display: block;
      width: 100%;
      max-width: 780px; /* Tamaño grande y destacado */
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .logo-link:hover {
      transform: scale(1.02); /* Sutil efecto interactivo al pasar el mouse */
      opacity: 0.9;
    }

    .hero-main-logo {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <a href="https://www.youtube.com/@gabinetearte/videos" target="_blank" class="logo-link">
    <img src="LOGO_HEADER.png" alt="Gabinete — Arte Contemporáneo en Chile" class="hero-main-logo">
  </a>

</body>
</html>
